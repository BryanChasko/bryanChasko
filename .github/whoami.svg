<svg viewBox="0 0 800 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes flicker { 0%,100%{opacity:1} 42%{opacity:0.97} 44%{opacity:0.94} 46%{opacity:1} }
      .crt { animation: flicker 0.2s steps(1) infinite; }
    </style>
    <pattern id="s1" patternUnits="userSpaceOnUse" width="800" height="4">
      <rect width="800" height="2" fill="transparent"/><rect y="2" width="800" height="2" fill="#000" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="56" fill="#0a0a0a"/>
  <g class="crt">
    <rect width="800" height="56" fill="url(#s1)"/>
    <text x="400" y="22" font-family="'Courier New',monospace" font-size="13" fill="#00e5ff" opacity="0.7" text-anchor="middle" letter-spacing="1">
      &gt; whoami
      <animate attributeName="opacity" from="0" to="0.7" dur="1s" fill="freeze"/>
    </text>
    <text x="400" y="44" font-family="'Courier New',monospace" font-size="13" fill="#00ff41" opacity="0" text-anchor="middle" letter-spacing="1">
      aws serverless · rust &gt; python &gt; typescript · agentic workflows · accessible systems
      <animate attributeName="opacity" from="0" to="0.8" begin="1.5s" dur="1s" fill="freeze"/>
    </text>
  </g>
</svg>
