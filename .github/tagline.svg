<svg viewBox="0 0 800 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fade-in { 0%, 8% { opacity: 0; } 12%, 100% { opacity: 1; } }
      @keyframes box-draw {
        0%, 3% { stroke-dashoffset: 1400; }
        20% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        42% { opacity: 0.97; }
        44% { opacity: 0.94; }
        46% { opacity: 1; }
      }
      .tagline-text { animation: fade-in 4s ease-out infinite; }
      .box-border { animation: box-draw 4s ease-out infinite, flicker 0.2s steps(1) infinite; }
    </style>
  </defs>
  <rect width="800" height="48" fill="#0a0a0a"/>
  <!-- box border draws itself -->
  <rect class="box-border" x="200" y="6" width="400" height="36" rx="1" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.5" stroke-dasharray="1400" stroke-dashoffset="1400"/>
  <!-- tagline text fades in after box draws -->
  <text class="tagline-text" x="400" y="30" font-family="'Courier New',monospace" font-size="13" fill="#00ff41" opacity="0.8" text-anchor="middle" letter-spacing="2">aws hero . ai/ml infrastructure . cybernetics</text>
</svg>
