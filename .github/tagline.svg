<svg viewBox="0 0 800 36" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes cyber-flicker {
        0%, 88% { opacity: 0.85; }
        89% { opacity: 0.4; }
        90% { opacity: 0.9; }
        92% { opacity: 0.3; }
        93% { opacity: 0.85; }
        96% { opacity: 0.5; }
        97%, 100% { opacity: 0.85; }
      }
    </style>
  </defs>
  <rect width="800" height="36" fill="#0a0a0a"/>
  <text x="400" y="24" font-family="'Courier New',monospace" font-size="14" fill="#00ff41" opacity="0" text-anchor="middle" letter-spacing="3">
    aws hero · ai/ml infrastructure · <tspan style="animation: cyber-flicker 5s ease-in-out infinite" fill="#00e5ff">cybernetics</tspan>
    <animate attributeName="opacity" from="0" to="0.85" dur="2s" fill="freeze"/>
  </text>
</svg>
