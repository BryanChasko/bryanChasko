<svg viewBox="0 0 800 36" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes cyber-flicker {
        0%, 88% { opacity: 0.85; }
        89% { opacity: 0.4; }
        90% { opacity: 0.9; }
        92% { opacity: 0.3; }
        93% { opacity: 0.85; }
        96% { opacity: 0.5; }
        97%, 100% { opacity: 0.85; }
      }
      @keyframes circuit-rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .flicker { animation: cyber-flicker 5s ease-in-out infinite; }
      .circuit-a { animation: circuit-rotate 6s linear infinite; }
      .circuit-b { animation: circuit-rotate 8s linear infinite; }
    </style>
  </defs>
  <rect width="800" height="36" fill="#0a0a0a"/>

  <g opacity="0" font-family="'Courier New',monospace" font-size="14" font-weight="bold">
    <animate attributeName="opacity" from="0" to="1" dur="2s" fill="freeze"/>

    <!-- three equispaced segments at 200, 400, 600 -->
    <text x="200" y="24" text-anchor="middle" fill="#ff9900">aws hero</text>

    <!-- circuit 1 -->
    <g class="circuit-a" transform-origin="300 18">
      <circle cx="300" cy="18" r="3" fill="none" stroke="#00ff41" stroke-width="0.6" opacity="0.4"/>
      <circle cx="300" cy="15" r="1" fill="#00ff41" opacity="0.5"/>
      <line x1="298" y1="18" x2="302" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
      <line x1="300" y1="16" x2="300" y2="20" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    </g>

    <text x="400" y="24" text-anchor="middle">
      <tspan class="flicker" fill="#00e5ff">ai</tspan><tspan fill="#00ff41"> infrastructure</tspan>
    </text>

    <!-- circuit 2 -->
    <g class="circuit-b" transform-origin="500 18">
      <circle cx="500" cy="18" r="3" fill="none" stroke="#00ff41" stroke-width="0.6" opacity="0.4"/>
      <circle cx="503" cy="18" r="1" fill="#00ff41" opacity="0.5"/>
      <line x1="498" y1="18" x2="502" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
      <line x1="500" y1="16" x2="500" y2="20" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    </g>

    <text class="flicker" x="600" y="24" text-anchor="middle" fill="#00e5ff">cybernetics</text>
  </g>
</svg>
