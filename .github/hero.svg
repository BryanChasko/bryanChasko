<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* crt scanline overlay */
      @keyframes scanline-drift {
        0% { transform: translateY(-4px); }
        100% { transform: translateY(200px); }
      }

      /* phosphor flicker — whole screen */
      @keyframes crt-flicker {
        0%, 100% { opacity: 1; }
        4% { opacity: 0.97; }
        8% { opacity: 1; }
        12% { opacity: 0.98; }
        42% { opacity: 1; }
        44% { opacity: 0.96; }
        46% { opacity: 1; }
        78% { opacity: 0.99; }
        80% { opacity: 0.96; }
        82% { opacity: 1; }
      }

      /* prompt appears first */
      @keyframes prompt-in {
        0%, 4% { opacity: 0; }
        5%, 100% { opacity: 1; }
      }

      /* typing reveal — clip rect width grows in steps */
      @keyframes type-reveal {
        0%, 7% { width: 0; }
        8% { width: 0; }
        38% { width: 182px; }
        70% { width: 182px; }
        71% { width: 182px; opacity: 1; }
        82% { width: 182px; opacity: 1; }
        83% { opacity: 0.8; }
        84% { opacity: 0.2; }
        85% { opacity: 0.9; }
        86% { opacity: 0.1; }
        87% { opacity: 0.7; }
        88% { opacity: 0; }
        100% { opacity: 0; width: 182px; }
      }

      /* cursor blink */
      @keyframes cursor-blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      /* cursor follows typed text then vanishes */
      @keyframes cursor-travel {
        0%, 7% { transform: translateX(0px); opacity: 0; }
        8% { transform: translateX(0px); opacity: 1; }
        38% { transform: translateX(182px); opacity: 1; }
        48% { transform: translateX(182px); opacity: 1; }
        49% { transform: translateX(182px); opacity: 0; }
        100% { opacity: 0; }
      }

      /* glitch — the whole terminal shakes before vanishing */
      @keyframes terminal-glitch {
        0%, 80% { transform: translate(0, 0) skewX(0deg); opacity: 1; }
        82% { transform: translate(3px, 0) skewX(0.5deg); opacity: 0.8; }
        83% { transform: translate(-4px, 1px) skewX(-1deg); opacity: 0.3; }
        84% { transform: translate(2px, -1px) skewX(0.3deg); opacity: 0.9; }
        85% { transform: translate(-3px, 0) skewX(-0.5deg); opacity: 0.15; }
        86% { transform: translate(4px, 1px) skewX(1deg); opacity: 0.7; }
        87% { transform: translate(0, 0) skewX(0deg); opacity: 0.05; }
        88%, 95% { opacity: 0; transform: translate(0, 0); }
        96% { opacity: 0.4; transform: translate(1px, 0); }
        97%, 100% { opacity: 0; transform: translate(0, 0); }
      }

      /* scanline bar */
      .scanline {
        animation: scanline-drift 4s linear infinite;
      }

      /* whole screen flicker */
      .crt-screen {
        animation: crt-flicker 0.15s steps(1) infinite, terminal-glitch 10s ease-in-out infinite;
      }

      /* prompt fade-in */
      .prompt {
        animation: prompt-in 10s ease-in-out infinite;
      }

      /* typed text reveal */
      .type-clip rect {
        animation: type-reveal 10s steps(13) infinite;
      }

      /* cursor composite: blink + travel */
      .cursor-block {
        animation: cursor-blink 0.7s steps(1) infinite, cursor-travel 10s steps(13) infinite;
      }
    </style>

    <!-- scanline pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="800" height="4">
      <rect width="800" height="2" fill="transparent"/>
      <rect y="2" width="800" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>

    <!-- clip path for typing reveal -->
    <clipPath id="typing-mask">
      <rect class="type-clip" x="0" y="0" width="0" height="40">
        <animate attributeName="width" values="0;0;0;0;0;0;0;0;182;182;182;182;182;182;182;182;182;182;182;182;0" dur="10s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </clipPath>
  </defs>

  <!-- deep black background -->
  <rect width="800" height="200" fill="#0a0a0a"/>

  <!-- subtle vignette -->
  <rect width="800" height="200" fill="url(#vignette)" opacity="0.4"/>

  <!-- the crt screen group — flickers + glitches as one unit -->
  <g class="crt-screen">

    <!-- faint green phosphor ambience -->
    <rect width="800" height="200" fill="#001a00" opacity="0.3"/>

    <!-- scanline overlay -->
    <rect width="800" height="200" fill="url(#scanlines)" opacity="0.6"/>

    <!-- moving scanline bar -->
    <rect class="scanline" x="0" y="-4" width="800" height="6" fill="rgba(0,255,65,0.04)"/>

    <!-- prompt: ^.^$ -->
    <g class="prompt">
      <text x="224" y="108" font-family="'Courier New', 'Lucida Console', monospace" font-size="22" font-weight="bold" fill="#00ffff" opacity="0.95" letter-spacing="1">
        <tspan fill="#00ffff" style="filter: drop-shadow(0 0 6px rgba(0,255,255,0.8)) drop-shadow(0 0 12px rgba(0,255,255,0.4))">^.^</tspan><tspan fill="#00ffff" dx="4" style="filter: drop-shadow(0 0 6px rgba(0,255,255,0.8))">$</tspan>
      </text>
    </g>

    <!-- typed text: hello, friend — revealed by clip -->
    <g clip-path="url(#typing-mask)" transform="translate(296, 88)">
      <text x="0" y="20" font-family="'Courier New', 'Lucida Console', monospace" font-size="22" font-weight="bold" fill="#00ff41" letter-spacing="1" style="filter: drop-shadow(0 0 5px rgba(0,255,65,0.9)) drop-shadow(0 0 10px rgba(0,255,65,0.5)) drop-shadow(0 0 20px rgba(0,255,65,0.3))">hello, friend</text>
    </g>

    <!-- blinking cursor block -->
    <g class="cursor-block" transform="translate(296, 90)">
      <rect x="0" y="0" width="13" height="22" rx="1" fill="#00ff41" opacity="0.95" style="filter: drop-shadow(0 0 8px rgba(0,255,65,0.9)) drop-shadow(0 0 16px rgba(0,255,65,0.5))"/>
    </g>

    <!-- top edge phosphor bleed -->
    <rect x="0" y="0" width="800" height="1" fill="#00ff41" opacity="0.06"/>
    <!-- bottom edge phosphor bleed -->
    <rect x="0" y="199" width="800" height="1" fill="#00ff41" opacity="0.06"/>

  </g>
</svg>
