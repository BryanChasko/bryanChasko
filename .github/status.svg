<svg viewBox="0 0 800 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink-dot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      @keyframes type-status {
        0%, 5% { width: 0; }
        6% { width: 0; }
        40% { width: 220px; }
        100% { width: 220px; }
      }
    </style>
    <clipPath id="status-reveal">
      <rect x="0" y="0" width="0" height="32">
        <animate attributeName="width" values="0;0;0;20;40;60;80;100;120;140;160;180;200;220;220;220;220;220;220;220" dur="8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </clipPath>
  </defs>
  <rect width="800" height="32" fill="#0a0a0a"/>
  <!-- blinking status dots -->
  <circle cx="295" cy="16" r="3" fill="#00ff41">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="307" cy="16" r="3" fill="#00ff41">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="319" cy="16" r="3" fill="#00ff41">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <!-- typed status text -->
  <g clip-path="url(#status-reveal)" transform="translate(332, 4)">
    <text x="8" y="20" font-family="'Courier New',monospace" font-size="14" fill="#00ff41" opacity="0.7">systems nominal</text>
  </g>
</svg>
